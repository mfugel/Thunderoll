<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunderoll v0.9 – Multiplayer Dice Game</title>
    <meta name="description" content="Thunderoll v0.9 – Multiplayer Farkle-style dice game with selectable themes, official scoring, hot dice, 7 optional rule variations, and per-player icons">
    <style>
        :root{
            /* Dice colors — theme-independent; the dice are the game's identity */
            --d1:#ff6b6b;--d2:#4834d4;--d3:#00d2d3;--d4:#ff9ff3;--d5:#54a0ff;--d6:#5f27cd;
            /* Default theme — Twilight */
            --bg-from:#667eea;--bg-to:#764ba2;
            --container-bg:rgba(0,0,0,.4);
            --panel-bg:rgba(255,255,255,.1);
            --panel-bg-strong:rgba(255,255,255,.15);
            --panel-border:rgba(255,255,255,.22);
            --accent:#f1c40f;--accent-soft:rgba(241,196,15,.6);
            --text:#fff;
            --title-shadow:0 2px 6px rgba(0,0,0,.5);
            --log-bg:rgba(0,0,0,.3);
        }
        body[data-theme="casino"]{
            --bg-from:#0d4222;--bg-to:#1d6a3a;
            --container-bg:rgba(0,20,10,.55);
            --panel-bg:rgba(0,60,30,.45);
            --panel-bg-strong:rgba(0,70,35,.6);
            --panel-border:rgba(255,215,0,.35);
            --accent:#ffd700;--accent-soft:rgba(255,215,0,.7);
            --title-shadow:0 2px 6px rgba(0,0,0,.7),0 0 16px rgba(255,215,0,.35);
            --log-bg:rgba(0,15,5,.55);
        }
        body[data-theme="sunset"]{
            --bg-from:#ff7e5f;--bg-to:#feb47b;
            --container-bg:rgba(60,10,0,.42);
            --panel-bg:rgba(255,255,255,.18);
            --panel-bg-strong:rgba(255,255,255,.25);
            --panel-border:rgba(255,255,255,.4);
            --accent:#ffe66d;--accent-soft:rgba(255,230,109,.7);
            --title-shadow:0 2px 8px rgba(120,40,0,.5);
            --log-bg:rgba(60,10,0,.45);
        }
        body[data-theme="forest"]{
            --bg-from:#134e5e;--bg-to:#71b280;
            --container-bg:rgba(0,30,30,.5);
            --panel-bg:rgba(255,255,255,.1);
            --panel-bg-strong:rgba(255,255,255,.15);
            --panel-border:rgba(255,255,255,.22);
            --accent:#f7d358;--accent-soft:rgba(247,211,88,.65);
            --title-shadow:0 2px 6px rgba(0,30,20,.6);
            --log-bg:rgba(0,20,20,.45);
        }
        body[data-theme="midnight"]{
            --bg-from:#0f2027;--bg-to:#2c5364;
            --container-bg:rgba(10,15,25,.65);
            --panel-bg:rgba(255,255,255,.06);
            --panel-bg-strong:rgba(255,255,255,.1);
            --panel-border:rgba(0,212,255,.25);
            --accent:#00d4ff;--accent-soft:rgba(0,212,255,.6);
            --title-shadow:0 0 18px rgba(0,212,255,.5),0 2px 4px rgba(0,0,0,.6);
            --log-bg:rgba(0,5,10,.55);
        }

        html,body{margin:0;padding:0;height:100%}
        body{font-family:'Segoe UI','Helvetica Neue',Tahoma,sans-serif;background:linear-gradient(135deg,var(--bg-from),var(--bg-to));color:var(--text);padding:20px 10px;box-sizing:border-box;min-height:100vh;overflow-y:auto;transition:background 600ms ease}
        .c{max-width:1000px;margin:0 auto;background:var(--container-bg);border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.35);position:relative;z-index:10;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:background 400ms ease}
        h1{text-align:center;font-size:2.8em;margin:0 0 10px;text-shadow:var(--title-shadow);letter-spacing:3px;font-weight:800;transition:text-shadow 400ms ease}
        .setup{background:var(--panel-bg);padding:20px;border-radius:12px;margin-bottom:20px;text-align:center;transition:background 400ms ease}
        .setup-row{display:flex;justify-content:center;gap:12px;margin:15px 0;flex-wrap:wrap;align-items:center}
        .setup-row label{font-weight:500}
        input[type=number]{padding:8px 12px;border-radius:6px;border:none;background:var(--panel-bg-strong);color:var(--text);width:120px}
        .player-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:15px 0}
        .player-item{display:flex;gap:8px;background:var(--panel-bg-strong);padding:8px 12px;border-radius:10px;align-items:center;border:1px solid var(--panel-border);transition:background 400ms ease,border 400ms ease}
        .player-item input{background:rgba(255,255,255,.2);border:none;color:var(--text);padding:6px 8px;border-radius:6px;width:120px}
        .player-item button.remove-player{background:#e74c3c;color:#fff;border:none;padding:4px 8px;border-radius:4px;cursor:pointer}
        button{background:#3498db;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:bold;transition:transform .15s ease,box-shadow .2s ease,background .2s ease}
        button:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
        button:active:not(:disabled){transform:translateY(0)}
        button:disabled{opacity:.45;cursor:not-allowed;transform:none}
        .top-controls{display:flex;justify-content:center;gap:15px;margin:20px 0;flex-wrap:wrap;align-items:center}
        #rollBtn,#bankBtn{font-size:1.25em;padding:14px 28px;border-radius:12px;letter-spacing:.3px;display:inline-flex;align-items:center;gap:10px;box-shadow:0 4px 14px rgba(0,0,0,.35)}
        #rollBtn{background:linear-gradient(135deg,#27ae60,#2ecc71);text-shadow:0 1px 2px rgba(0,0,0,.25)}
        #rollBtn:hover:not(:disabled){background:linear-gradient(135deg,#229954,#27ae60);box-shadow:0 6px 22px rgba(46,204,113,.55)}
        #rollBtn:not(:disabled){animation:rollPulse 2.2s ease-in-out infinite}
        @keyframes rollPulse{0%,100%{box-shadow:0 4px 14px rgba(46,204,113,.35)}50%{box-shadow:0 4px 22px rgba(46,204,113,.75)}}
        #bankBtn{background:linear-gradient(135deg,#f39c12,#e67e22);text-shadow:0 1px 2px rgba(0,0,0,.25)}
        #bankBtn:hover:not(:disabled){background:linear-gradient(135deg,#e67e22,#d35400);box-shadow:0 6px 22px rgba(243,156,18,.55)}
        .sound-btn{background:#9b59b6 !important}
        .current-player,.target-score{font-size:1.5em;text-align:center;margin:15px 0;padding:12px;background:var(--panel-bg-strong);border-radius:12px;border:1px solid var(--panel-border);transition:background 400ms ease,border 400ms ease}
        .dice-container{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin:30px 0;perspective:600px}
        .bank-area{margin:20px auto 10px;padding:12px 18px 16px;background:rgba(127,140,141,.12);border:2px dashed rgba(127,140,141,.55);border-radius:14px;max-width:680px;display:none}
        .bank-area.has-dice{display:block}
        .bank-label{text-align:center;font-size:.85em;font-weight:bold;color:#bdc3c7;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}
        .bank-dice{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:0;perspective:none}
        .bank-dice .die.locked{opacity:.9;transform:none;cursor:default;border-color:#95a5a6 !important;box-shadow:0 2px 6px rgba(0,0,0,.3)}
        .die{width:70px;height:70px;border-radius:12px;cursor:pointer;transition:.3s;box-shadow:0 4px 12px rgba(0,0,0,.35);border:4px solid transparent;position:relative;overflow:hidden}
        .die.rolling{animation:r .8s cubic-bezier(.2,.8,.4,1)}
        @keyframes r{0%{transform:translateY(0) rotateX(0)}100%{transform:translateY(-20px) rotateX(720deg) rotateY(720deg)}}
        .die:hover:not(.kept):not(.rolling){transform:scale(1.08)}
        .die.scoring{border-color:var(--accent) !important;box-shadow:0 0 30px var(--accent-soft)}
        .die.selected{border-color:#2ecc71 !important;box-shadow:0 0 30px #2ecc71;transform:scale(.95)}
        .die.locked{border-color:#7f8c8d !important;opacity:.55;cursor:not-allowed;transform:scale(.92);box-shadow:none}
        .die.d1{background:var(--d1)}.die.d2{background:var(--d2)}.die.d3{background:var(--d3)}.die.d4{background:var(--d4)}.die.d5{background:var(--d5)}.die.d6{background:var(--d6)}
        .die svg{width:100%;height:100%}
        .dot{fill:#fff}
        .score-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:20px 0}
        .player-score{background:var(--panel-bg-strong);padding:12px;border-radius:12px;text-align:center;border:1px solid transparent;transition:background .3s ease,transform .2s ease,border .2s ease,box-shadow .3s ease}
        .player-score.current{border:3px solid var(--accent);transform:scale(1.05);box-shadow:0 0 24px var(--accent-soft)}
        .player-score.winner{border:3px solid #2ecc71;background:rgba(46,204,113,.3)}
        .turn-info{text-align:center;margin:15px 0}
        .selected-score{font-size:1.8em;color:#2ecc71;font-weight:bold}
        .roll-score{font-size:1.4em;color:var(--accent)}
        .log{max-height:120px;overflow-y:auto;background:var(--log-bg);padding:10px;border-radius:8px;font-size:.9em;margin-top:20px}
        .hot-dice,.farkle{font-weight:bold;font-size:1.5em}
        .hot-dice{color:var(--accent);animation:p 1.5s infinite}
        .farkle{color:#e74c3c;animation:s .5s}
        @keyframes p{50%{opacity:.7}}@keyframes s{25%,75%{transform:translateX(-5px)}}
        canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
        .rules-btn{background:#16a085 !important}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
        .modal-content{background:#2c3e50;padding:24px 28px;border-radius:12px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);color:#fff}
        .modal-content h3{margin-top:0;color:var(--accent)}
        .modal-content h4{margin-bottom:8px;margin-top:18px;color:var(--accent)}
        .modal-content table{width:100%;border-collapse:collapse;margin:8px 0}
        .modal-content td{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
        .modal-content td:last-child{text-align:right;font-weight:bold;color:var(--accent)}
        .modal-content ul{padding-left:20px;margin:8px 0}
        .modal-content li{margin:6px 0;line-height:1.45}
        .modal-close{margin-top:16px;width:100%;background:#3498db}
        .rules-legend{font-size:.85em;opacity:.8;margin-top:8px}
        .variations{margin:18px auto 6px;padding:14px 18px;background:rgba(255,255,255,.07);border-radius:10px;max-width:620px;border:1px dashed var(--panel-border);transition:border 400ms ease}
        .variations-title{font-weight:bold;color:var(--accent);margin-bottom:8px;text-align:center;letter-spacing:.5px}
        .variations label{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
        .variations input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent)}
        .variations select{padding:6px 10px;border-radius:6px;border:none;background:var(--panel-bg-strong);color:var(--text);cursor:pointer}
        .variations select option{color:#000}
        .info-icon{background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:.85em;font-weight:bold;cursor:pointer;padding:0;margin-left:6px;line-height:1;opacity:.75;border-radius:50%;box-shadow:none;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s ease,background .15s ease,transform .15s ease}
        .info-icon:hover:not(:disabled){background:var(--accent-soft);opacity:1;transform:scale(1.12);box-shadow:none}
        .win-preset{background:#34495e;font-size:.9em;padding:6px 10px}
        .rule-hint{margin-top:8px;font-size:.95em;color:#f39c12;min-height:1.2em}
        .player-icon{background:var(--panel-bg-strong) !important;font-size:1.4em;padding:4px 8px !important;line-height:1;cursor:pointer;border:1px solid var(--panel-border)}
        .player-icon:hover{filter:brightness(1.25)}
        .icon-picker{position:absolute;background:#2c3e50;border:1px solid var(--panel-border);border-radius:8px;padding:6px;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.5)}
        .icon-picker button{background:rgba(255,255,255,.1);border:none;font-size:1.4em;width:36px;height:36px;border-radius:6px;cursor:pointer;padding:0;line-height:1}
        .icon-picker button:hover{background:var(--accent-soft)}
        .theme-row{justify-content:flex-end;margin-bottom:4px}
        .theme-row select{padding:8px 14px;font-size:1em;border-radius:8px;border:1px solid var(--panel-border);background:var(--panel-bg-strong);color:var(--text);cursor:pointer;font-weight:600;letter-spacing:.3px}
        .theme-row select option{color:#000;background:#fff}
        .theme-row label{font-size:.95em;opacity:.85}
    </style>
</head>
<body>
<div class="c">
    <h1>Thunderoll v0.9</h1>
    <div id="setup" class="setup">
        <h2>Game Setup</h2>
        <div class="setup-row theme-row">
            <label for="themePicker">Theme:</label>
            <select id="themePicker">
                <option value="twilight">🌆 Twilight</option>
                <option value="casino">🎰 Casino</option>
                <option value="sunset">🌅 Sunset</option>
                <option value="forest">🌲 Forest</option>
                <option value="midnight">🌌 Midnight</option>
            </select>
        </div>
        <div class="setup-row">
            <label>Winning Score:</label>
            <input type="number" id="winScore" value="10000" min="1000" step="1000">
            <button type="button" class="win-preset" data-val="5000">5K</button>
            <button type="button" class="win-preset" data-val="10000">10K</button>
            <button type="button" class="win-preset" data-val="20000">20K</button>
        </div>
        <div class="setup-row"><button id="addPlayer">Add Player</button></div>
        <div class="player-list" id="playerList">
            <div class="player-item" data-icon="🐶"><button class="player-icon" type="button">🐶</button><input type="text" value="Player 1"><button class="remove-player">×</button></div>
        </div>
        <div class="variations">
            <div class="variations-title">Rule Variations</div>
            <div class="setup-row">
                <label><input type="checkbox" id="bigMultipliers"> Big Multipliers — 4/5/6 of a Kind score ×2 / ×3 / ×4</label>
                <button type="button" class="info-icon" data-info="bigMultipliers" title="Click for details" aria-label="More info about Big Multipliers">i</button>
            </div>
            <div class="setup-row">
                <label><input type="checkbox" id="fullHouse"> Full House — 3+2 (5 dice) or 3+2+1 (6 dice) = 1,500</label>
                <button type="button" class="info-icon" data-info="fullHouse" title="Click for details" aria-label="More info about Full House">i</button>
            </div>
            <div class="setup-row">
                <label><input type="checkbox" id="twoTriples"> Two Triples — two 3-of-a-kinds in one roll = 2,500</label>
                <button type="button" class="info-icon" data-info="twoTriples" title="Click for details" aria-label="More info about Two Triples">i</button>
            </div>
            <div class="setup-row">
                <label for="breakInScore">Break-in Score:</label>
                <select id="breakInScore">
                    <option value="0">Off</option>
                    <option value="300">300 (must reach to get on board)</option>
                    <option value="500">500</option>
                    <option value="1000">1,000</option>
                </select>
                <button type="button" class="info-icon" data-info="breakInScore" title="Click for details" aria-label="More info about Break-in Score">i</button>
            </div>
            <div class="setup-row">
                <label for="triplePenalty">Triple-Bust Penalty:</label>
                <select id="triplePenalty">
                    <option value="0">Off</option>
                    <option value="-500">-500</option>
                    <option value="-1000" selected>-1,000 (default)</option>
                </select>
                <button type="button" class="info-icon" data-info="triplePenalty" title="Click for details" aria-label="More info about Triple-Bust Penalty">i</button>
            </div>
            <div class="setup-row">
                <label for="straightValue">Straight (1-2-3-4-5-6):</label>
                <select id="straightValue">
                    <option value="1000" selected>1,000 (default)</option>
                    <option value="1500">1,500</option>
                </select>
                <button type="button" class="info-icon" data-info="straightValue" title="Click for details" aria-label="More info about Straight value">i</button>
            </div>
        </div>
        <div id="iconPicker" class="icon-picker" style="display:none"></div>
        <div style="margin-top:20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
            <button id="startGame" style="background:#2ecc71;font-size:1.2em;padding:14px 32px">Start Game</button>
            <button id="setupRulesBtn" class="rules-btn" style="font-size:1em;padding:14px 24px">📖 Scoring Rules</button>
        </div>
    </div>
    <div id="game" style="display:none">
        <div class="top-controls">
            <button id="rollBtn"><span aria-hidden="true">🎲</span> Roll Dice</button>
            <button id="bankBtn" disabled><span aria-hidden="true">💰</span> Bank Score</button>
            <button id="rulesBtn" class="rules-btn">📖 Rules</button>
            <button id="soundBtn" class="sound-btn">Sound On</button>
            <button id="newGameBtn" style="background:#95a5a6">New Game</button>
        </div>
        <div class="current-player" id="currentPlayer"></div>
        <div class="target-score" id="targetScore">First to <strong>10,000</strong> wins!</div>
        <div class="bank-area" id="bankArea">
            <div class="bank-label">🔒 Locked This Turn</div>
            <div class="dice-container bank-dice" id="bankContainer"></div>
        </div>
        <div class="dice-container" id="diceContainer"></div>
        <div class="turn-info">
            <div class="selected-score" id="selectedScore">Selected Points: 0</div>
            <div class="roll-score" id="rollScore"></div>
            <div>Turn Total: <strong id="turnScore">0</strong></div>
            <div id="ruleHint" class="rule-hint"></div>
            <div id="statusMessage"></div>
        </div>
        <div class="score-board" id="scoreBoard"></div>
        <div class="log" id="gameLog"></div>
    </div>
</div>

<canvas id="confetti"></canvas>

<div id="rulesModal" class="modal" style="display:none">
    <div class="modal-content">
        <div id="rulesContent"></div>
        <button id="closeRulesBtn" class="modal-close">Close</button>
    </div>
</div>

<div id="variationInfoModal" class="modal" style="display:none">
    <div class="modal-content">
        <h3 id="variationInfoTitle"></h3>
        <div id="variationInfoBody"></div>
        <button id="closeVariationInfoBtn" class="modal-close">Got it</button>
    </div>
</div>

<script>
    // ========= v0.6: Rules engine + official-rule compliance =========
    // Bugs fixed from v0.5:
    //   - Straight was 1500, now 1000 per official rules
    //   - 4+ of a kind dropped extras for 1s/5s (e.g. four 1s scored 1000, now 1100)
    //   - Cross-roll combo bug: kept dice from prior rolls were re-evaluated as combos
    //     with current-roll dice (three separate 1s scored as triple-1s=1000 instead of 300)
    //   - Hot dice score-loss bug when user manually clicked the last scoring die
    //   - No enforcement of "must keep at least one scoring die per roll"
    //   - No "one more round after threshold" rule
    //   - No triple-Farkle penalty
    // Architecture: rulesets are pluggable. Add variants under RULESETS, expose a picker later.

    let soundEnabled = true;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playWin() { if(!soundEnabled) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.connect(g);g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(523.25,audioCtx.currentTime);o.frequency.setValueAtTime(659.25,audioCtx.currentTime+0.1);
        o.frequency.setValueAtTime(783.99,audioCtx.currentTime+0.2);o.frequency.setValueAtTime(1046.50,audioCtx.currentTime+0.3);
        g.gain.setValueAtTime(0.4,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+1.2);
        o.start();o.stop(audioCtx.currentTime+1.2); }
    function playFarkle() { if(!soundEnabled) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sawtooth';o.connect(g);g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(300,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(80,audioCtx.currentTime+0.6);
        g.gain.setValueAtTime(0.5,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.7);
        o.start();o.stop(audioCtx.currentTime+0.7); }
    function playRoll() { if(!soundEnabled) return; const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.connect(g);g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(120,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(60,audioCtx.currentTime+0.12);
        g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);
        o.start();o.stop(audioCtx.currentTime+0.15); }

    // Confetti (unchanged from v0.5)
    const confettiCanvas = document.getElementById('confetti');
    const ctx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    function resizeCanvas() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    function randomColor() { return ['#ff6b6b','#4834d4','#00d2d3','#ff9ff3','#54a0ff','#5f27cd','#f1c40f','#2ecc71'][Math.floor(Math.random()*8)]; }
    function createConfetti() { for(let i=0;i<300;i++) confettiParticles.push({x:Math.random()*confettiCanvas.width,y:Math.random()*confettiCanvas.height-confettiCanvas.height,r:Math.random()*6+2,d:Math.random()*10+1,color:randomColor(),tilt:Math.random()*10-10,tiltAngleIncremental:Math.random()*0.08+0.01,tiltAngle:0}); }
    function drawConfetti() { ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); confettiParticles.forEach((p,i)=>{p.tiltAngle+=p.tiltAngleIncremental;p.y+=p.d+Math.sin(p.tiltAngle)*0.5;p.tilt=Math.sin(p.tiltAngle)*15;if(p.y>confettiCanvas.height)confettiParticles.splice(i,1);else{ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.color;ctx.moveTo(p.x+p.tilt+p.r/2,p.y);ctx.lineTo(p.x+p.tilt-p.r/2,p.y+p.r);ctx.stroke();}}); if(confettiParticles.length>0) requestAnimationFrame(drawConfetti); }
    function triggerConfetti() { createConfetti(); setTimeout(()=>{createConfetti();setTimeout(createConfetti,200);},100); drawConfetti(); }

    // ============================================================
    //  RULESETS — add new variants here. Each ruleset is self-contained.
    // ============================================================
    const RULESETS = {
        official: {
            name: 'Official',
            description: 'Standard Farkle scoring per farkle.games/official-rules.',
            defaultWinScore: 10000,
            scoring: {
                ones: 100,
                fives: 50,
                threeOfAKind: { 1: 1000, 2: 200, 3: 300, 4: 400, 5: 500, 6: 600 },
                straight: 1000,           // 1-2-3-4-5-6
                threePairs: 750,
                // Variant slots — null means "fall through to triple + extras as singles"
                fourOfAKindMultiplier: null,   // e.g. 2 = double the triple value
                fiveOfAKindMultiplier: null,   // e.g. 3
                sixOfAKindMultiplier: null,    // e.g. 4
                twoTriplets: null,             // e.g. 2500 — two 3-of-a-kinds in one roll
                fourPlusPair: null,            // e.g. 1500 — 4-of-a-kind + a pair in one roll
                fullHouse: null,               // e.g. 1500 — 3+2+1 shape on a 6-die roll (all 6 lock)
            },
            rules: {
                tripleFarklePenalty: -1000,
                oneMoreRoundAfterThreshold: true,
                minScoreToGetOnBoard: 0,
                mustKeepEachRoll: true,
            },
        },
        // future variants slot in here — same shape, different numbers
    };

    let activeRuleset = RULESETS.official;

    // ============================================================
    //  SCORING ENGINE — pure function over (values, ruleset)
    //  Returns max score for the dice plus indices that contribute.
    // ============================================================
    function evaluate(values, rs = activeRuleset) {
        if (!values.length) return { score: 0, scoringIndices: [] };
        const count = {};
        values.forEach(v => { count[v] = (count[v] || 0) + 1; });

        // Full-6 special combos (only valid on a fresh roll of 6)
        if (values.length === 6) {
            if (new Set(values).size === 6) {
                return { score: rs.scoring.straight, scoringIndices: values.map((_, i) => i) };
            }
            const cv = Object.values(count);
            if (cv.length === 3 && cv.every(c => c === 2)) {
                return { score: rs.scoring.threePairs, scoringIndices: values.map((_, i) => i) };
            }
            if (rs.scoring.twoTriplets && cv.length === 2 && cv.every(c => c === 3)) {
                return { score: rs.scoring.twoTriplets, scoringIndices: values.map((_, i) => i) };
            }
            if (rs.scoring.fourPlusPair && cv.length === 2 && cv.includes(2) && cv.includes(4)) {
                return { score: rs.scoring.fourPlusPair, scoringIndices: values.map((_, i) => i) };
            }
            // Full House on a 6-die roll: shape {3,2,1}. The 5 dice in the {3,2} groups lock as
            // the Full House. The singleton (the third number) is treated as a normal scoring die:
            // if it's a 1 or 5 it can be banked alongside the Full House; otherwise it's left
            // unscored so the player can reroll it.
            if (rs.scoring.fullHouse && cv.length === 3 && cv.includes(3) && cv.includes(2) && cv.includes(1)) {
                const singletonNum = Number(Object.keys(count).find(k => count[k] === 1));
                const fhIdx = [], singletonIdx = [];
                values.forEach((v, i) => (v === singletonNum ? singletonIdx : fhIdx).push(i));
                const extra = singletonNum === 1 ? rs.scoring.ones : singletonNum === 5 ? rs.scoring.fives : 0;
                if (extra > 0) {
                    return { score: rs.scoring.fullHouse + extra, scoringIndices: [...fhIdx, ...singletonIdx] };
                }
                return { score: rs.scoring.fullHouse, scoringIndices: fhIdx };
            }
        }

        // Full House on a 5-die roll (or a 5-die selection): shape {3,2}. All 5 lock.
        if (values.length === 5 && rs.scoring.fullHouse) {
            const cv5 = Object.values(count);
            if (cv5.length === 2 && cv5.includes(3) && cv5.includes(2)) {
                return { score: rs.scoring.fullHouse, scoringIndices: values.map((_, i) => i) };
            }
        }

        const scoringIndices = new Set();
        let score = 0;

        for (let n = 1; n <= 6; n++) {
            const c = count[n] || 0;
            if (c >= 3) {
                values.forEach((v, i) => { if (v === n) scoringIndices.add(i); });
                const tripleScore = rs.scoring.threeOfAKind[n];
                const mult =
                    c >= 6 && rs.scoring.sixOfAKindMultiplier ? rs.scoring.sixOfAKindMultiplier :
                    c >= 5 && rs.scoring.fiveOfAKindMultiplier ? rs.scoring.fiveOfAKindMultiplier :
                    c >= 4 && rs.scoring.fourOfAKindMultiplier ? rs.scoring.fourOfAKindMultiplier :
                    null;
                if (mult !== null) {
                    score += tripleScore * mult;
                } else {
                    // No variant — count one triple, treat extras as singles (1s and 5s)
                    score += tripleScore;
                    const extras = c - 3;
                    if (n === 1) score += extras * rs.scoring.ones;
                    else if (n === 5) score += extras * rs.scoring.fives;
                }
            } else if (c > 0 && (n === 1 || n === 5)) {
                values.forEach((v, i) => { if (v === n) scoringIndices.add(i); });
                score += c * (n === 1 ? rs.scoring.ones : rs.scoring.fives);
            }
        }

        return { score, scoringIndices: Array.from(scoringIndices) };
    }

    // ============================================================
    //  STATE — selection is per-roll; locked is per-turn.
    // ============================================================
    const state = {
        players: [], icons: [], scores: [], farkleStreak: [],
        currentPlayer: 0,
        turnTotal: 0,              // points locked in this turn from prior rolls
        rollScore: 0,              // tentative score of current selection (current roll only)
        dice: [0,0,0,0,0,0],
        locked: new Set(),         // indices committed from prior rolls this turn
        selected: new Set(),       // indices picked in current roll (not yet locked)
        scoringIndices: [],        // indices in current roll that could score
        rolling: false,
        hotDicePending: false,     // all 6 locked; awaiting Roll-again or Bank
        winScore: 10000,
        finalRound: false,         // someone has crossed the threshold
        finalRoundTrigger: null,   // player idx who first crossed
        gameOver: false,
    };

    const els = {
        setup: document.getElementById('setup'),
        game: document.getElementById('game'),
        winScore: document.getElementById('winScore'),
        targetScore: document.getElementById('targetScore'),
        addPlayer: document.getElementById('addPlayer'),
        startGame: document.getElementById('startGame'),
        setupRulesBtn: document.getElementById('setupRulesBtn'),
        playerList: document.getElementById('playerList'),
        rollBtn: document.getElementById('rollBtn'),
        bankBtn: document.getElementById('bankBtn'),
        rulesBtn: document.getElementById('rulesBtn'),
        soundBtn: document.getElementById('soundBtn'),
        newGameBtn: document.getElementById('newGameBtn'),
        diceContainer: document.getElementById('diceContainer'),
        bankContainer: document.getElementById('bankContainer'),
        bankArea: document.getElementById('bankArea'),
        currentPlayer: document.getElementById('currentPlayer'),
        turnScore: document.getElementById('turnScore'),
        selectedScore: document.getElementById('selectedScore'),
        rollScore: document.getElementById('rollScore'),
        statusMessage: document.getElementById('statusMessage'),
        scoreBoard: document.getElementById('scoreBoard'),
        gameLog: document.getElementById('gameLog'),
        rulesModal: document.getElementById('rulesModal'),
        rulesContent: document.getElementById('rulesContent'),
        closeRulesBtn: document.getElementById('closeRulesBtn'),
        variationInfoModal: document.getElementById('variationInfoModal'),
        variationInfoTitle: document.getElementById('variationInfoTitle'),
        variationInfoBody: document.getElementById('variationInfoBody'),
        closeVariationInfoBtn: document.getElementById('closeVariationInfoBtn'),
        bigMultipliers: document.getElementById('bigMultipliers'),
        fullHouseToggle: document.getElementById('fullHouse'),
        twoTriplesToggle: document.getElementById('twoTriples'),
        breakInScore: document.getElementById('breakInScore'),
        triplePenalty: document.getElementById('triplePenalty'),
        straightValue: document.getElementById('straightValue'),
        ruleHint: document.getElementById('ruleHint'),
        winPresets: document.querySelectorAll('.win-preset'),
        iconPicker: document.getElementById('iconPicker'),
        themePicker: document.getElementById('themePicker'),
    };

    // v0.9 — theme system. CSS variables on body[data-theme] do all the heavy lifting;
    // this just toggles the attribute and persists the choice across reloads.
    const VALID_THEMES = ['twilight', 'casino', 'sunset', 'forest', 'midnight'];
    function applyTheme(name) {
        if (!VALID_THEMES.includes(name)) name = 'twilight';
        document.body.dataset.theme = name;
        try { localStorage.setItem('thunderoll-theme', name); } catch (e) { /* private mode, no-op */ }
    }

    // v0.8 — player icon set. Cycled on Add Player; user can re-pick via the icon button.
    const ICON_LIST = ['🐶','🐱','🦊','🐼','🐯','🦁','🐸','🦄','🐰','🐻','🦅','🐢'];
    let iconPickerTarget = null;  // the .player-icon button currently being edited

    // v0.7+ — rebuild activeRuleset from setup-screen toggles. Deep-cloning RULESETS.official
    // keeps the canonical config pristine even after multiple games with different variants.
    function syncRulesetFromUI() {
        const r = JSON.parse(JSON.stringify(RULESETS.official));
        const variants = [];
        if (els.bigMultipliers && els.bigMultipliers.checked) {
            r.scoring.fourOfAKindMultiplier = 2;
            r.scoring.fiveOfAKindMultiplier = 3;
            r.scoring.sixOfAKindMultiplier = 4;
            variants.push('Big Multipliers');
        }
        if (els.fullHouseToggle && els.fullHouseToggle.checked) {
            r.scoring.fullHouse = 1500;
            variants.push('Full House');
        }
        if (els.twoTriplesToggle && els.twoTriplesToggle.checked) {
            r.scoring.twoTriplets = 2500;
            variants.push('Two Triples');
        }
        const minScore = els.breakInScore ? parseInt(els.breakInScore.value, 10) || 0 : 0;
        r.rules.minScoreToGetOnBoard = minScore;
        if (minScore > 0) variants.push(`Break-in ${minScore.toLocaleString()}`);
        const penalty = els.triplePenalty ? parseInt(els.triplePenalty.value, 10) : -1000;
        r.rules.tripleFarklePenalty = penalty;
        if (penalty !== -1000) variants.push(penalty === 0 ? 'No triple-bust penalty' : `Triple-bust ${penalty}`);
        const straight = els.straightValue ? parseInt(els.straightValue.value, 10) || 1000 : 1000;
        r.scoring.straight = straight;
        if (straight !== 1000) variants.push(`Straight ${straight.toLocaleString()}`);
        r.activeVariants = variants;
        if (variants.length) r.name = `Official + ${variants.join(' + ')}`;
        activeRuleset = r;
    }

    document.addEventListener('DOMContentLoaded', () => {
        els.addPlayer.onclick = () => {
            if (els.playerList.children.length >= 6) return alert('Max 6 players');
            const idx = els.playerList.children.length;
            const icon = ICON_LIST[idx % ICON_LIST.length];
            const d = document.createElement('div');
            d.className = 'player-item';
            d.dataset.icon = icon;
            d.innerHTML = `<button class="player-icon" type="button">${icon}</button><input type="text" value="Player ${idx + 1}"><button class="remove-player">×</button>`;
            els.playerList.appendChild(d);
        };
        els.startGame.onclick = startGame;
        els.rollBtn.onclick = onRollClick;
        els.bankBtn.onclick = bankScore;
        els.newGameBtn.onclick = () => confirm('New game?') && location.reload();
        els.soundBtn.onclick = () => {
            soundEnabled = !soundEnabled;
            els.soundBtn.textContent = soundEnabled ? 'Sound On' : 'Sound Off';
        };
        els.playerList.onclick = e => {
            if (e.target.classList.contains('remove-player')) {
                e.target.parentElement.remove();
                return;
            }
            if (e.target.classList.contains('player-icon')) {
                openIconPicker(e.target);
                e.stopPropagation();
            }
        };
        els.iconPicker.onclick = e => {
            const btn = e.target.closest('button');
            if (!btn || !iconPickerTarget) return;
            const icon = btn.dataset.icon;
            iconPickerTarget.textContent = icon;
            iconPickerTarget.closest('.player-item').dataset.icon = icon;
            closeIconPicker();
            e.stopPropagation();
        };
        document.addEventListener('click', e => {
            if (els.iconPicker.style.display === 'none') return;
            if (els.iconPicker.contains(e.target)) return;
            if (e.target.classList && e.target.classList.contains('player-icon')) return;
            closeIconPicker();
        });
        els.rulesBtn.onclick = openRules;
        els.setupRulesBtn.onclick = openRules;
        els.closeRulesBtn.onclick = closeRules;
        els.rulesModal.onclick = e => { if (e.target === els.rulesModal) closeRules(); };
        document.querySelectorAll('.info-icon').forEach(btn => {
            btn.onclick = e => { e.preventDefault(); e.stopPropagation(); openVariationInfo(btn.dataset.info); };
        });
        els.closeVariationInfoBtn.onclick = closeVariationInfo;
        els.variationInfoModal.onclick = e => { if (e.target === els.variationInfoModal) closeVariationInfo(); };
        els.winPresets.forEach(btn => {
            btn.onclick = () => { els.winScore.value = btn.dataset.val; };
        });
        // v0.9 — load saved theme (or default) and wire the picker
        let savedTheme = 'twilight';
        try { savedTheme = localStorage.getItem('thunderoll-theme') || 'twilight'; } catch (e) {}
        applyTheme(savedTheme);
        els.themePicker.value = savedTheme;
        els.themePicker.onchange = () => applyTheme(els.themePicker.value);
        renderRules();
    });

    // v0.8 — icon picker. A single floating popup, repositioned next to the clicked icon button.
    function openIconPicker(button) {
        iconPickerTarget = button;
        const rect = button.getBoundingClientRect();
        els.iconPicker.innerHTML = ICON_LIST.map(ic => `<button type="button" data-icon="${ic}">${ic}</button>`).join('');
        els.iconPicker.style.display = 'grid';
        // Position below the button; clamp to viewport.
        const pickerRect = els.iconPicker.getBoundingClientRect();
        let left = rect.left + window.scrollX;
        let top = rect.bottom + window.scrollY + 6;
        if (left + pickerRect.width > window.innerWidth - 8) left = window.innerWidth - pickerRect.width - 8;
        els.iconPicker.style.left = left + 'px';
        els.iconPicker.style.top = top + 'px';
    }
    function closeIconPicker() {
        els.iconPicker.style.display = 'none';
        iconPickerTarget = null;
    }

    function startGame() {
        const items = [...els.playerList.querySelectorAll('.player-item')];
        const names = items.map(it => it.querySelector('input').value.trim() || 'Player');
        const icons = items.map((it, i) => it.dataset.icon || ICON_LIST[i % ICON_LIST.length]);
        if (!names.length) return alert('Add at least one player');
        syncRulesetFromUI();  // v0.7 — freeze variation choices into activeRuleset
        state.players = names;
        state.icons = icons;
        state.scores = names.map(() => 0);
        state.farkleStreak = names.map(() => 0);
        state.winScore = Math.max(1000, parseInt(els.winScore.value) || activeRuleset.defaultWinScore);
        state.currentPlayer = 0;
        state.finalRound = false;
        state.finalRoundTrigger = null;
        state.gameOver = false;
        els.targetScore.innerHTML = `First to <strong>${state.winScore.toLocaleString()}</strong> wins! <span class="rules-legend">(${activeRuleset.name} rules)</span>`;
        els.setup.style.display = 'none';
        els.game.style.display = 'block';
        log(`Game started — ${activeRuleset.name} rules — first to ${state.winScore.toLocaleString()}`);
        nextTurn();
    }

    function nextTurn() {
        // Final-round termination: back to the player who first crossed → game over
        if (state.finalRound && state.currentPlayer === state.finalRoundTrigger) {
            endGame();
            return;
        }
        state.turnTotal = 0;
        state.rollScore = 0;
        state.dice = [0,0,0,0,0,0];
        state.locked.clear();
        state.selected.clear();
        state.scoringIndices = [];
        state.hotDicePending = false;
        state.rolling = false;
        els.diceContainer.innerHTML = '';
        els.bankContainer.innerHTML = '';
        els.bankArea.classList.remove('has-dice');
        els.turnScore.textContent = '0';
        els.selectedScore.textContent = 'Selected Points: 0';
        els.rollScore.textContent = '';
        els.statusMessage.textContent = '';
        els.statusMessage.className = '';
        els.statusMessage.style.color = '';
        els.statusMessage.style.fontSize = '';
        els.rollBtn.disabled = false;
        els.rollBtn.innerHTML = '<span aria-hidden="true">🎲</span> Roll Dice';
        els.bankBtn.disabled = true;
        updateCurrentPlayer();
        updateScoreBoard();
        updateRuleHint();
        log(`${state.players[state.currentPlayer]}'s turn${state.finalRound ? ' (final round)' : ''}`);
    }

    function updateCurrentPlayer() {
        const icon = state.icons[state.currentPlayer] || '';
        els.currentPlayer.textContent = `${icon} ${state.players[state.currentPlayer]}'s Turn`;
    }

    // The Roll button has three modes:
    //   1. Initial roll of the turn → roll all 6
    //   2. Subsequent roll → lock current selection (turn total += rollScore), roll remaining
    //   3. Hot dice pending → clear locked, roll fresh 6
    function onRollClick() {
        if (state.rolling || state.gameOver) return;

        const isInitialRoll = state.locked.size === 0 && state.selected.size === 0 && state.dice.every(v => v === 0);

        if (state.hotDicePending) {
            // Mode 3 — hot dice: clear locked, fresh 6
            state.locked.clear();
            state.hotDicePending = false;
            state.scoringIndices = [];
            els.statusMessage.textContent = '';
            els.statusMessage.className = '';
        } else if (!isInitialRoll) {
            // Mode 2 — must have a valid selection
            if (state.rollScore === 0) return;  // button should be disabled, but guard
            state.selected.forEach(i => state.locked.add(i));
            state.turnTotal += state.rollScore;
            state.selected.clear();
            state.rollScore = 0;
            state.scoringIndices = [];

            // Hot dice check — did locking just fill all 6?
            if (state.locked.size === 6) {
                state.hotDicePending = true;
                renderDice(false);
                updateScores();
                els.statusMessage.textContent = '🔥 HOT DICE! Roll fresh 6 or Bank.';
                els.statusMessage.className = 'hot-dice';
                els.rollBtn.disabled = false;
                els.rollBtn.innerHTML = '<span aria-hidden="true">🔥</span> Roll Hot Dice';
                els.bankBtn.disabled = state.turnTotal === 0;
                log(`HOT DICE! Turn total: ${state.turnTotal.toLocaleString()}`);
                return;
            }
        }
        // (Mode 1 — initial roll — falls through to the roll below)

        const indicesToRoll = [];
        for (let i = 0; i < 6; i++) {
            if (!state.locked.has(i)) indicesToRoll.push(i);
        }
        if (indicesToRoll.length === 0) return;  // safety

        state.rolling = true;
        els.rollBtn.disabled = true;
        els.bankBtn.disabled = true;
        playRoll();

        indicesToRoll.forEach(i => {
            state.dice[i] = Math.floor(Math.random() * 6) + 1;
        });

        renderDice(true);

        setTimeout(() => {
            // Evaluate ONLY the freshly-rolled dice (not the whole turn)
            const freshValues = indicesToRoll.map(i => state.dice[i]);
            const { score: rollMax, scoringIndices: localScoring } = evaluate(freshValues);

            if (rollMax === 0) {
                handleFarkle(freshValues);
                return;
            }

            state.scoringIndices = localScoring.map(li => indicesToRoll[li]);
            els.rollScore.textContent = `This roll can score up to: +${rollMax.toLocaleString()}`;
            log(`Rolled: [${freshValues.join(', ')}] — up to +${rollMax.toLocaleString()}`);

            state.rolling = false;
            renderDice(false);
            updateScores();
            updateButtonStates();
        }, 900);
    }

    // Click a die — toggle selection. Only scoring dice in the current roll can be selected.
    function onDieClick(globalIdx) {
        if (state.rolling || state.hotDicePending || state.gameOver) return;
        if (state.locked.has(globalIdx)) return;  // locked dice are inert

        if (state.selected.has(globalIdx)) {
            state.selected.delete(globalIdx);
        } else {
            if (!state.scoringIndices.includes(globalIdx)) return;  // non-scoring, ignore
            state.selected.add(globalIdx);
        }

        // Recompute rollScore from the selection only (no cross-roll combos)
        const selectedValues = [...state.selected].map(i => state.dice[i]);
        state.rollScore = evaluate(selectedValues).score;

        renderDice(false);
        updateScores();
        updateButtonStates();
    }

    function updateScores() {
        els.selectedScore.textContent = `Selected Points: ${state.rollScore.toLocaleString()}`;
        els.turnScore.textContent = (state.turnTotal + state.rollScore).toLocaleString();
        updateScoreBoard();
    }

    function updateButtonStates() {
        if (state.hotDicePending) {
            els.rollBtn.disabled = false;
            els.rollBtn.innerHTML = '<span aria-hidden="true">🔥</span> Roll Hot Dice';
            els.bankBtn.disabled = state.turnTotal === 0 || blockedByBreakIn(state.turnTotal);
            updateRuleHint();
            return;
        }
        const projected = state.turnTotal + state.rollScore;
        const hasValidSelection = state.rollScore > 0;
        const hasPointsToBank = projected > 0;
        els.rollBtn.disabled = !hasValidSelection;
        els.bankBtn.disabled = !hasPointsToBank || blockedByBreakIn(projected);
        els.rollBtn.innerHTML = (state.locked.size > 0 || state.selected.size > 0) ? '<span aria-hidden="true">🎲</span> Roll Remaining' : '<span aria-hidden="true">🎲</span> Roll Dice';
        updateRuleHint();
    }

    function updateRuleHint() {
        if (!els.ruleHint) return;
        const min = activeRuleset.rules.minScoreToGetOnBoard || 0;
        if (min && state.scores[state.currentPlayer] === 0 && !state.gameOver) {
            const projected = state.turnTotal + (state.hotDicePending ? 0 : state.rollScore);
            if (projected < min) {
                els.ruleHint.textContent = `Need ${min.toLocaleString()} to get on the board (have ${projected.toLocaleString()}).`;
                return;
            }
        }
        els.ruleHint.textContent = '';
    }

    function handleFarkle(roll) {
        playFarkle();
        els.statusMessage.textContent = 'BUST!';
        els.statusMessage.className = 'farkle';

        state.farkleStreak[state.currentPlayer]++;
        state.turnTotal = 0;
        state.rollScore = 0;

        let msg = `${state.players[state.currentPlayer]} busted on [${roll.join(', ')}]!`;

        const penalty = activeRuleset.rules.tripleFarklePenalty;
        if (penalty && state.farkleStreak[state.currentPlayer] >= 3) {
            state.scores[state.currentPlayer] = Math.max(0, state.scores[state.currentPlayer] + penalty);
            state.farkleStreak[state.currentPlayer] = 0;
            msg += ` Triple farkle! ${penalty} penalty.`;
        }

        log(msg);
        updateScoreBoard();

        setTimeout(() => {
            state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
            nextTurn();
        }, 2000);
    }

    // v0.7 — break-in rule: until a player has banked any points, they can't end
    // their turn until they reach the threshold in a single turn.
    function blockedByBreakIn(projectedBank) {
        const min = activeRuleset.rules.minScoreToGetOnBoard || 0;
        if (!min) return false;
        if (state.scores[state.currentPlayer] > 0) return false;
        return projectedBank < min;
    }

    function bankScore() {
        if (state.rolling || state.gameOver) return;

        // hotDicePending: turnTotal already includes the just-locked points (selected was emptied at lock-time)
        // Otherwise: also include the currently-selected dice
        let banked = state.turnTotal;
        if (!state.hotDicePending) banked += state.rollScore;
        if (banked === 0) return;

        if (blockedByBreakIn(banked)) {
            const min = activeRuleset.rules.minScoreToGetOnBoard;
            log(`${state.players[state.currentPlayer]} needs ${min.toLocaleString()} to get on board — keep rolling.`);
            updateRuleHint();
            return;
        }

        state.farkleStreak[state.currentPlayer] = 0;  // banking resets streak
        state.scores[state.currentPlayer] += banked;
        log(`${state.players[state.currentPlayer]} banked ${banked.toLocaleString()} (total: ${state.scores[state.currentPlayer].toLocaleString()})`);
        updateScoreBoard();

        // Threshold-crossing logic
        if (state.scores[state.currentPlayer] >= state.winScore && !state.finalRound) {
            if (activeRuleset.rules.oneMoreRoundAfterThreshold) {
                state.finalRound = true;
                state.finalRoundTrigger = state.currentPlayer;
                log(`🏁 ${state.players[state.currentPlayer]} crossed ${state.winScore.toLocaleString()}! One last turn for everyone else.`);
            } else {
                playWin(); triggerConfetti(); endGame();
                return;
            }
        }

        state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
        setTimeout(nextTurn, 800);
    }

    function endGame() {
        state.gameOver = true;
        els.rollBtn.disabled = true;
        els.bankBtn.disabled = true;
        let maxScore = -Infinity, winner = 0;
        state.scores.forEach((s, i) => { if (s > maxScore) { maxScore = s; winner = i; } });
        els.statusMessage.innerHTML = `🏆 ${state.players[winner]} WINS! (${maxScore.toLocaleString()})`;
        els.statusMessage.className = '';
        els.statusMessage.style.color = '#2ecc71';
        els.statusMessage.style.fontSize = '2.2em';
        log(`WINNER: ${state.players[winner]} with ${maxScore.toLocaleString()}!`);
        playWin();
        triggerConfetti();
        updateScoreBoard();
    }

    function renderDice(anim) {
        els.diceContainer.innerHTML = '';
        els.bankContainer.innerHTML = '';
        state.dice.forEach((val, i) => {
            if (val === 0) return;
            const die = document.createElement('div');
            die.className = `die d${val}`;
            if (anim && !state.locked.has(i)) die.classList.add('rolling');
            if (state.locked.has(i)) die.classList.add('locked');
            else if (state.selected.has(i)) die.classList.add('selected');
            else if (state.scoringIndices.includes(i)) die.classList.add('scoring');

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', '0 0 100 100');
            const dots = {1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],4:[[25,25],[25,75],[75,25],[75,75]],5:[[25,25],[25,75],[50,50],[75,25],[75,75]],6:[[25,25],[25,50],[25,75],[75,25],[75,50],[75,75]]};
            dots[val].forEach(([x,y]) => {
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', 8);
                c.setAttribute('class', 'dot');
                svg.appendChild(c);
            });
            die.appendChild(svg);
            die.onclick = () => onDieClick(i);
            (state.locked.has(i) ? els.bankContainer : els.diceContainer).appendChild(die);
        });
        els.bankArea.classList.toggle('has-dice', state.locked.size > 0);
    }

    function updateScoreBoard() {
        els.scoreBoard.innerHTML = '';
        state.players.forEach((name, i) => {
            const div = document.createElement('div');
            const isWinner = state.gameOver && state.scores[i] === Math.max(...state.scores);
            div.className = `player-score${i === state.currentPlayer && !state.gameOver ? ' current' : ''}${isWinner ? ' winner' : ''}`;
            const pending = (state.turnTotal + state.rollScore);
            const turnDisplay = (i === state.currentPlayer && !state.gameOver && pending > 0)
                ? `<div style="color:#2ecc71">+${pending.toLocaleString()}</div>`
                : '';
            const streakDisplay = (state.farkleStreak[i] > 0)
                ? `<div style="font-size:.8em;color:#e74c3c">busts in a row: ${state.farkleStreak[i]}</div>`
                : '';
            const crossedFlag = (state.finalRound && state.finalRoundTrigger === i && !state.gameOver)
                ? `<div style="font-size:.8em;color:#f1c40f">⚡ crossed ${state.winScore.toLocaleString()}</div>`
                : '';
            const icon = state.icons[i] || '';
            div.innerHTML = `
                <div style="font-size:1.8em;line-height:1">${icon}</div>
                <div style="font-weight:bold">${name}</div>
                <div style="font-size:1.4em">${state.scores[i].toLocaleString()}</div>
                ${turnDisplay}${streakDisplay}${crossedFlag}`;
            els.scoreBoard.appendChild(div);
        });
    }

    // ============================================================
    //  RULES MODAL — generated from the active ruleset, so adding
    //  a variant later automatically updates the displayed table.
    // ============================================================
    function openRules() {
        // v0.7 — when opened from setup, mirror current toggle state so the modal previews variants.
        // Once a game is underway, els.setup is hidden and we leave the locked-in ruleset alone.
        if (els.setup.style.display !== 'none') syncRulesetFromUI();
        renderRules();
        els.rulesModal.style.display = 'flex';
    }
    function closeRules() { els.rulesModal.style.display = 'none'; }

    // Explanations for each rule variation toggle in the setup screen.
    const VARIATION_INFO = {
        bigMultipliers: {
            title: 'Big Multipliers',
            body: `<p>By default, rolling 4 / 5 / 6 of the same number scores the triple (e.g. three 4s = 400) plus the extras as singles. With <strong>Big Multipliers</strong> on, the triple value is multiplied:</p>
                   <ul>
                     <li><strong>4 of a Kind</strong> — triple × 2</li>
                     <li><strong>5 of a Kind</strong> — triple × 3</li>
                     <li><strong>6 of a Kind</strong> — triple × 4</li>
                   </ul>
                   <p><strong>Examples:</strong></p>
                   <ul>
                     <li>Four 4s = 400 × 2 = <strong>800</strong></li>
                     <li>Five 6s = 600 × 3 = <strong>1,800</strong></li>
                     <li>Six 1s = 1,000 × 4 = <strong>4,000</strong></li>
                   </ul>
                   <p class="rules-legend">Bigger payouts on lucky rolls — riskier hot-streak chasing.</p>`,
        },
        fullHouse: {
            title: 'Full House',
            body: `<p>A <strong>Full House</strong> is three of one number plus two of another (a 3+2 shape). Worth <strong>1,500</strong>. It can be claimed on either:</p>
                   <ul>
                     <li><strong>A 5-die roll</strong> — all 5 dice form the 3+2. All 5 lock as the Full House. (If you already had 1 die locked from earlier, that's hot dice — reroll fresh 6 or bank.)</li>
                     <li><strong>A 6-die roll</strong> with shape 3+2+1 — five dice form the Full House and one leftover die is a singleton.</li>
                   </ul>
                   <p><strong>On a 6-die Full House you choose how to play the leftover:</strong></p>
                   <ul>
                     <li>If the leftover is a <strong>1 or 5</strong>, you can bank it alongside the Full House for 1,550 or 1,600 total.</li>
                     <li>Or <strong>reroll just the leftover</strong> — the 5 Full House dice stay locked, and the leftover rolls again for a chance at more points.</li>
                     <li>Or <strong>bank the 1,500</strong> as-is and end your turn.</li>
                   </ul>
                   <p><strong>Examples:</strong></p>
                   <ul>
                     <li>5-5-5-2-2-1 → FH (1,500) + leftover 1 (100) = <strong>1,600</strong> banked, or 1,500 and reroll the 1.</li>
                     <li>3-3-3-6-6-4 → FH (1,500). The 4 can't be banked — reroll it or bank 1,500.</li>
                     <li>5-5-5-2-2 (on a 5-die roll) → <strong>1,500</strong>; all 5 lock.</li>
                   </ul>
                   <p class="rules-legend">Unlike Straight or Three Pairs, Full House doesn't lock all 6 dice — the leftover stays in play.</p>`,
        },
        twoTriples: {
            title: 'Two Triples',
            body: `<p>On a <em>fresh roll of all 6 dice</em>, if you roll two different three-of-a-kinds (e.g. three 2s and three 5s), the entire roll scores a flat <strong>2,500</strong> regardless of which numbers.</p>
                   <p><strong>Example:</strong> 3-3-3-6-6-6 = Two Triples = 2,500.</p>
                   <p class="rules-legend">Without this toggle, the same dice would score the two triples separately (e.g. 300 + 600 = 900). Two Triples makes this rare shape much more rewarding.</p>`,
        },
        breakInScore: {
            title: 'Break-in Score',
            body: `<p>A common house rule. You must bank at least this many points in a <em>single turn</em> before any points count toward your total.</p>
                   <ul>
                     <li>Until you "break in," banking less than the threshold scores <strong>0</strong> for the turn.</li>
                     <li>Once you're on the board, normal scoring resumes for the rest of the game.</li>
                   </ul>
                   <p><strong>Example with 500:</strong> a 300-point first turn = 0. A 550-point first turn = 550 banked. After that, any amount you bank counts.</p>
                   <p class="rules-legend">Slows the early game and pushes players to take a bigger risk on their first turn.</p>`,
        },
        triplePenalty: {
            title: 'Triple-Bust Penalty',
            body: `<p>Farkling means rolling no scoring dice — your turn ends with no points. If you Farkle <strong>three turns in a row</strong>, this penalty is deducted from your total score.</p>
                   <ul>
                     <li><strong>Off</strong> — no penalty</li>
                     <li><strong>-500</strong> or <strong>-1,000</strong> — that amount is subtracted</li>
                   </ul>
                   <p>Your total can go negative if you have fewer banked points than the penalty.</p>
                   <p class="rules-legend">Punishes a cold streak. Standard Farkle rule; default is -1,000.</p>`,
        },
        straightValue: {
            title: 'Straight (1-2-3-4-5-6)',
            body: `<p>Rolling one of each number — 1, 2, 3, 4, 5, 6 — on a fresh roll of all 6 dice is called a <strong>straight</strong>. This sets how many points the straight is worth.</p>
                   <ul>
                     <li><strong>1,000</strong> — the most common rule (default)</li>
                     <li><strong>1,500</strong> — used by some house rules to reward the rarity</li>
                   </ul>
                   <p class="rules-legend">All 6 dice lock as a unit when you take the straight.</p>`,
        },
    };

    function openVariationInfo(key) {
        const info = VARIATION_INFO[key];
        if (!info) return;
        els.variationInfoTitle.textContent = info.title;
        els.variationInfoBody.innerHTML = info.body;
        els.variationInfoModal.style.display = 'flex';
    }
    function closeVariationInfo() { els.variationInfoModal.style.display = 'none'; }

    function renderRules() {
        const rs = activeRuleset;
        const sc = rs.scoring, r = rs.rules;
        const lines = [];
        lines.push(`<h3>${rs.name} Rules</h3>`);
        lines.push(`<p style="opacity:.85">${rs.description}</p>`);
        lines.push('<h4>Scoring</h4>');
        lines.push('<table><tbody>');
        lines.push(`<tr><td>Single 1</td><td>${sc.ones}</td></tr>`);
        lines.push(`<tr><td>Single 5</td><td>${sc.fives}</td></tr>`);
        for (let n = 1; n <= 6; n++) {
            lines.push(`<tr><td>Three ${n}s</td><td>${sc.threeOfAKind[n].toLocaleString()}</td></tr>`);
        }
        lines.push(`<tr><td>Straight (1-2-3-4-5-6)</td><td>${sc.straight.toLocaleString()}</td></tr>`);
        lines.push(`<tr><td>Three pairs</td><td>${sc.threePairs}</td></tr>`);
        if (sc.twoTriplets) {
            lines.push(`<tr><td>Two triples (3+3)</td><td>${sc.twoTriplets.toLocaleString()}</td></tr>`);
        }
        if (sc.fullHouse) {
            lines.push(`<tr><td>Full house (3+2, or 3+2+1)</td><td>${sc.fullHouse.toLocaleString()}</td></tr>`);
        }
        if (sc.fourOfAKindMultiplier) {
            lines.push(`<tr><td>Four of a kind</td><td>×${sc.fourOfAKindMultiplier} the triple value</td></tr>`);
        }
        if (sc.fiveOfAKindMultiplier) {
            lines.push(`<tr><td>Five of a kind</td><td>×${sc.fiveOfAKindMultiplier} the triple value</td></tr>`);
        }
        if (sc.sixOfAKindMultiplier) {
            lines.push(`<tr><td>Six of a kind</td><td>×${sc.sixOfAKindMultiplier} the triple value</td></tr>`);
        }
        lines.push('</tbody></table>');
        if (!sc.fourOfAKindMultiplier && !sc.fiveOfAKindMultiplier && !sc.sixOfAKindMultiplier) {
            lines.push('<p class="rules-legend">Four+ of a kind: scores one triple plus extras as singles (1s = 100, 5s = 50). Toggle "Big Multipliers" in setup for the ×2 / ×3 / ×4 variant.</p>');
        } else {
            lines.push('<p class="rules-legend">Big Multipliers active — four/five/six of a kind multiply the triple value instead of treating extras as singles.</p>');
        }
        lines.push('<h4>Gameplay</h4>');
        lines.push('<ul>');
        lines.push('<li>Roll all 6 dice. Pick scoring dice. Roll remaining, or Bank.</li>');
        lines.push('<li><strong>You must keep at least one scoring die from each roll.</strong></li>');
        lines.push('<li>Dice from separate rolls cannot be combined into a single combo.</li>');
        lines.push('<li>If a roll yields no scoring dice → <strong>BUST</strong>, and you lose all unbanked points for the turn.</li>');
        if (r.tripleFarklePenalty) {
            lines.push(`<li>Three busts in a row: <strong>${r.tripleFarklePenalty.toLocaleString()}</strong> penalty.</li>`);
        }
        if (r.minScoreToGetOnBoard) {
            lines.push(`<li><strong>Break-in:</strong> until you've banked any points, you must reach <strong>${r.minScoreToGetOnBoard.toLocaleString()}</strong> in a single turn before you can bank.</li>`);
        }
        lines.push('<li><strong>HOT DICE</strong>: when all 6 dice score in one turn, you can roll fresh 6 or Bank.</li>');
        if (r.oneMoreRoundAfterThreshold) {
            lines.push(`<li>When a player crosses the win threshold, every other player gets one last turn — highest score wins.</li>`);
        }
        lines.push('</ul>');
        lines.push('<h4>Visual key</h4>');
        lines.push('<ul>');
        lines.push('<li><span style="color:#f1c40f">Yellow border</span> — die could contribute to a scoring combo</li>');
        lines.push('<li><span style="color:#2ecc71">Green border</span> — die selected in current roll (click again to unselect)</li>');
        lines.push('<li><span style="color:#7f8c8d">Gray, dim</span> — die locked from a previous roll this turn</li>');
        lines.push('</ul>');
        els.rulesContent.innerHTML = lines.join('');
    }

    function log(msg) {
        const line = document.createElement('div');
        line.textContent = `> ${msg}`;
        els.gameLog.appendChild(line);
        els.gameLog.scrollTop = els.gameLog.scrollHeight;
    }
</script>
</body>
</html>
